<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHRONOS ENGINE - MODULE-03</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0a0f1d;
            --panel-bg: #111827;
            --accent-blue: #38bdf8;
            --accent-green: #34d399;
            --accent-purple: #a78bfa;
            --accent-pink: #f472b6;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #1f2937;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .header {
            border-bottom: 2px solid var(--accent-blue);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 2px;
            color: var(--accent-blue);
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
        .container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }
        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 12px;
            color: var(--accent-blue);
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        input, select {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }
        input:focus, select:focus {
            border-color: var(--accent-blue);
            outline: none;
        }
        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: var(--bg-color);
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }
        .btn:hover {
            opacity: 0.9;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .chart-container {
            background-color: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            position: relative;
            height: 260px;
        }
        .chart-title {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 10px;
            border-left: 3px solid var(--accent-green);
            padding-left: 8px;
        }
        .output-panel {
            grid-column: span 2;
            background-color: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            min-height: 200px;
        }
        .output-text {
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.6;
            color: #d1d5db;
        }
        .loading {
            color: var(--accent-pink);
            animation: blink 1s infinite;
            display: none;
            font-weight: bold;
            margin-top: 10px;
            text-align: center;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>CHRONOS ENGINE // MODULE-03</h1>
        <div style="font-size: 12px; color: var(--accent-green);">● APPAREL INTEL ACTIVE</div>
    </div>

    <div class="container">
        <div class="panel">
            <div class="form-group">
                <label>Target Brand / 店舗名</label>
                <input type="text" id="brandName" value="EDITED" placeholder="例: SHEIN, ZARA, 競合名など">
            </div>
            
            <div class="form-group">
                <label>Product Category / 品種</label>
                <select id="category">
                    <option value="T-shirt">Tシャツ/カットソー</option>
                    <option value="Shirt">シャツ/ブラウス</option>
                    <option value="Knit">ニット/セーター</option>
                    <option value="Dress">ワンピース</option>
                    <option value="Outer">アウター/ジャケット</option>
                    <option value="Pants">パンツ/ボトムス</option>
                    <option value="Skirt">スカート</option>
                    <option value="Bag">バッグ/小物</option>
                </select>
            </div>

            <div class="form-group">
                <label>Sales Channel / 販売チャネル</label>
                <select id="channel">
                    <option value="All">全体（マルチチャネル）</option>
                    <option value="Amazon">Amazon</option>
                    <option value="Rakuten">楽天市場</option>
                    <option value="Shopee">Shopee</option>
                    <option value="eBay">eBay</option>
                    <option value="Qoo10">Qoo10</option>
                    <option value="OwnEC">自社ECサイト</option>
                </select>
            </div>

            <div class="form-group">
                <label>Target Region / 対象国・地域</label>
                <select id="region">
                    <option value="Global">全世界（累計）</option>
                    <option value="Japan">日本</option>
                    <option value="US">アメリカ</option>
                    <option value="SEA">東南アジア</option>
                    <option value="EU">ヨーロッパ</option>
                </select>
            </div>

            <div class="form-group">
                <label>Color / Material / Design (色柄・素材・デザイン)</label>
                <input type="text" id="attributes" value="モノトーン, コットン, オーバーサイズ" placeholder="コンマ区切りで入力">
            </div>

            <button class="btn" onclick="runAnalysis()">AI多角分析・グラフ生成</button>
            <div class="loading" id="loadingText">▶ ENGINE PROCESSING DATA...</div>
        </div>

        <div class="dashboard">
            <div class="chart-container">
                <div class="chart-title">製品売上ランキング（推定数量）</div>
                <canvas id="chartProducts"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">店舗・ブランド チャネル別シェア比率 (%)</div>
                <canvas id="chartChannels"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">色柄・素材・デザイン別 売上構成比</div>
                <canvas id="chartDesigns"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">レビュー感情不満分析（件数順）</div>
                <canvas id="chartSentiments"></canvas>
            </div>

            <div class="output-panel">
                <div class="chart-title">CHRONOS 商品開発戦略指示書 OUTPUT</div>
                <div class="output-text" id="outputText">ここにAIの緻密な分析指示書が出力されます。左のパラメータを調整して実行してください。</div>
            </div>
        </div>
    </div>

    <script>
        let charts = {};

        function initChart(id, type, labels, data, label, color) {
            if (charts[id]) charts[id].destroy();
            const ctx = document.getElementById(id).getContext('2d');
            charts[id] = new Chart(ctx, {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{
                        label: label,
                        data: data,
                        backgroundColor: color,
                        borderColor: color,
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#9ca3af', font: { size: 10 } } } },
                    scales: type === 'bar' ? {
                        x: { grid: { color: '#1f2937' }, ticks: { color: '#9ca3af', font: { size: 9 } } },
                        y: { grid: { color: '#1f2937' }, ticks: { color: '#9ca3af', font: { size: 9 } } }
                    } : {}
                }
            });
        }

        async function runAnalysis() {
            const btn = document.querySelector('.btn');
            const loading = document.getElementById('loadingText');
            btn.disabled = true;
            loading.style.display = 'block';

            const payload = {
                brand: document.getElementById('brandName').value,
                category: document.getElementById('category').value,
                channel: document.getElementById('channel').value,
                region: document.getElementById('region').value,
                attributes: document.getElementById('attributes').value
            };

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                // 4つのグラフを動的にレンダリング
                initChart('chartProducts', 'bar', result.chartProducts.labels, result.chartProducts.data, '売上数', '#38bdf8');
                initChart('chartChannels', 'pie', result.chartChannels.labels, result.chartChannels.data, 'シェア', ['#38bdf8', '#34d399', '#a78bfa', '#f472b6', '#fbbf24', '#e5e7eb']);
                initChart('chartDesigns', 'doughnut', result.chartDesigns.labels, result.chartDesigns.data, '構成比', ['#a78bfa', '#f472b6', '#34d399', '#fbbf24']);
                initChart('chartSentiments', 'bar', result.chartSentiments.labels, result.chartSentiments.data, '不満・評価件数', '#f472b6');

                // 戦略テキストの出力
                document.getElementById('outputText').innerText = result.commentary;

            } catch (error) {
                document.getElementById('outputText').innerText = "エラーが発生しました。設定を確認してください。";
                console.error(error);
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
