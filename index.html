<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHRONOS ENGINE - MODULE-03</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0a0f1d;
            --panel-bg: #111827;
            --accent-blue: #38bdf8;
            --accent-green: #34d399;
            --accent-purple: #a78bfa;
            --accent-pink: #f472b6;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #1f2937;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .header {
            border-bottom: 2px solid var(--accent-blue);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 2px;
            color: var(--accent-blue);
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
        .container {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 20px;
        }
        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 11px;
            color: var(--accent-blue);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }
        input:focus {
            border-color: var(--accent-blue);
            outline: none;
            box-shadow: 0 0 5px rgba(56, 189, 248, 0.3);
        }
        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: var(--bg-color);
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }
        .btn:hover {
            opacity: 0.9;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .chart-container {
            background-color: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            position: relative;
            height: 260px;
        }
        .chart-title {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 10px;
            border-left: 3px solid var(--accent-green);
            padding-left: 8px;
        }
        .output-panel {
            grid-column: span 2;
            background-color: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            min-height: 200px;
        }
        .output-text {
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.6;
            color: #d1d5db;
        }
        .loading {
            color: var(--accent-pink);
            animation: blink 1s infinite;
            display: none;
            font-weight: bold;
            margin-top: 10px;
            text-align: center;
            font-size: 12px;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>CHRONOS ENGINE // MODULE-03 // V3.0</h1>
        <div style="font-size: 12px; color: var(--accent-green);">● HYBRID MULTI-SECTOR ACTIVE</div>
    </div>

    <div class="container">
        <div class="panel">
            <div class="form-group">
                <label>Industry / 業界セクター</label>
                <input type="text" id="industry" list="industry-list" value="アパレル" placeholder="選択または自由入力">
                <datalist id="industry-list">
                    <option value="アパレル">
                    <option value="コスメ・美容">
                </datalist>
            </div>

            <div class="form-group">
                <label>Target Brand・Store / ブランド名・店舗名</label>
                <input type="text" id="brandName" list="brand-list" value="AOKI" placeholder="選択または自由入力">
                <datalist id="brand-list">
                    <option value="AOKI">
                    <option value="EDITED">
                    <option value="SHEIN">
                    <option value="ZARA">
                    <option value="UNIQLO">
                </datalist>
            </div>
            
            <div class="form-group">
                <label>Product Category / 品種</label>
                <input type="text" id="category" list="category-list" value="Tシャツ/カットソー" placeholder="選択または自由入力">
                <datalist id="category-list">
                    <option value="全品種累計">
                    <option value="Tシャツ/カットソー">
                    <option value="シャツ/ブラウス">
                    <option value="ニット/セーター">
                    <option value="ワンピース">
                    <option value="アウター/ジャケット">
                    <option value="パンツ/ボトムス">
                    <option value="スカート">
                    <option value="バッグ/小物">
                    <option value="スキンケア/化粧水">
                    <option value="ファンデーション">
                </datalist>
            </div>

            <div class="form-group">
                <label>Sales Channel / 販売チャネル</label>
                <input type="text" id="channel" list="channel-list" value="全体（マルチチャネル）" placeholder="選択または自由入力">
                <datalist id="channel-list">
                    <option value="全体（マルチチャネル）">
                    <option value="Amazon">
                    <option value="楽天市場">
                    <option value="Shopee">
                    <option value="eBay">
                    <option value="Qoo10">
                    <option value="自社ECサイト">
                </datalist>
            </div>

            <div class="form-group">
                <label>Target Region / 対象国・地域</label>
                <input type="text" id="region" list="region-list" value="全世界（累計）" placeholder="選択または自由入力">
                <datalist id="region-list">
                    <option value="全世界（累計）">
                    <option value="日本">
                    <option value="アメリカ">
                    <option value="東南アジア">
                    <option value="ヨーロッパ">
                </datalist>
            </div>

            <div class="form-group">
                <label>Attributes / 色柄・素材・デザインなど</label>
                <input type="text" id="attributes" list="attributes-list" value="モノトーン, コットン, オーバーサイズ" placeholder="コンマ区切り（選択または自由入力）">
                <datalist id="attributes-list">
                    <option value="モノトーン, コットン, オーバーサイズ">
                    <option value="パステルカラー, シルク, フェミニン">
                    <option value="オーガニック, 無添加, 低刺激（コスメ用）">
                    <option value="高保湿, ヒアルロン酸, アンチエイジング（コスメ用）">
                </datalist>
            </div>

            <button class="btn" onclick="runAnalysis()">AI多角分析・グラフ生成</button>
            <div class="loading" id="loadingText">▶ ENGINE RUNNING CRITICAL DATA...</div>
        </div>

        <div class="dashboard">
            <div class="chart-container">
                <div class="chart-title" id="titleProducts">製品売上ランキング（推定数量）</div>
                <canvas id="chartProducts"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">店舗・ブランド チャネル別シェア比率 (%)</div>
                <canvas id="chartChannels"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">色柄・素材・デザイン別 売上構成比</div>
                <canvas id="chartDesigns"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">レビュー感情不満分析（件数順）</div>
                <canvas id="chartSentiments"></canvas>
            </div>

            <div class="output-panel">
                <div class="chart-title">CHRONOS 商品開発戦略指示書 OUTPUT</div>
                <div class="output-text" id="outputText">ここにAIの緻密な分析指示書が出力されます。左のパラメータを調整して実行してください。</div>
            </div>
        </div>
    </div>

    <script>
        let charts = {};

        function initChart(id, type, labels, data, label, color) {
            if (charts[id]) charts[id].destroy();
            const ctx = document.getElementById(id).getContext('2d');
            charts[id] = new Chart(ctx, {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{
                        label: label,
                        data: data,
                        backgroundColor: color,
                        borderColor: color,
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#9ca3af', font: { size: 10 } } } },
                    scales: type === 'bar' ? {
                        x: { grid: { color: '#1f2937' }, ticks: { color: '#9ca3af', font: { size: 9 } } },
                        y: { grid: { color: '#1f2937' }, ticks: { color: '#9ca3af', font: { size: 9 } } }
                    } : {}
                }
            });
        }

        async function runAnalysis() {
            const btn = document.querySelector('.btn');
            const loading = document.getElementById('loadingText');
            btn.disabled = true;
            loading.style.display = 'block';

            const payload = {
                industry: document.getElementById('industry').value,
                brand: document.getElementById('brandName').value,
                category: document.getElementById('category').value,
                channel: document.getElementById('channel').value,
                region: document.getElementById('region').value,
                attributes: document.getElementById('attributes').value
            };

            // 動的にグラフタイトルを変更
            document.getElementById('titleProducts').innerText = `${payload.category} 売上ランキング（推定数量）`;

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();

                if (result.error) {
                    document.getElementById('outputText').innerText = `【システムエラー】\n${result.error}\n\n原因として、GeminiのAPIキーの設定漏れ、またはAIの応答データ破損が考えられます。Vercelの環境変数を確認してください。`;
                    return;
                }

                // グラフ描画
                initChart('chartProducts', 'bar', result.chartProducts.labels, result.chartProducts.data, '推定売上数', '#38bdf8');
                initChart('chartChannels', 'pie', result.chartChannels.labels, result.chartChannels.data, 'シェア', ['#38bdf8', '#34d399', '#a78bfa', '#f472b6', '#fbbf24', '#e5e7eb']);
                initChart('chartDesigns', 'doughnut', result.chartDesigns.labels, result.chartDesigns.data, '構成比', ['#a78bfa', '#f472b6', '#34d399', '#fbbf24']);
                initChart('chartSentiments', 'bar', result.chartSentiments.labels, result.chartSentiments.data, '不満・評価件数', '#f472b6');

                document.getElementById('outputText').innerText = result.commentary;

            } catch (error) {
                document.getElementById('outputText').innerText = `【通信エラー発生】\nサーバーとの通信に失敗しました。\n詳細: ${error.message}`;
                console.error(error);
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
