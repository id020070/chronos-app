<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHRONOS ENGINE - MODULE-03</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0a0f1d;
            --panel-bg: #111827;
            --accent-blue: #38bdf8;
            --accent-green: #34d399;
            --accent-purple: #a78bfa;
            --accent-pink: #f472b6;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #1f2937;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .header {
            border-bottom: 2px solid var(--accent-blue);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 2px;
            color: var(--accent-blue);
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
        .container {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 20px;
        }
        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 18px;
            border-bottom: 1px dashed #1f2937;
            padding-bottom: 12px;
        }
        label {
            display: block;
            font-size: 11px;
            color: var(--accent-blue);
            margin-bottom: 5px;
            text-transform: uppercase;
            font-weight: bold;
        }
        select, input {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 13px;
        }
        input {
            margin-top: 5px;
            border-color: #2d3748;
        }
        input::placeholder {
            color: #4a5568;
            font-size: 11px;
        }
        select:focus, input:focus {
            border-color: var(--accent-blue);
            outline: none;
        }
        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: var(--bg-color);
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover {
            opacity: 0.9;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .chart-container {
            background-color: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            position: relative;
            height: 260px;
        }
        .chart-title {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 10px;
            border-left: 3px solid var(--accent-green);
            padding-left: 8px;
        }
        .output-panel {
            grid-column: span 2;
            background-color: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            min-height: 200px;
        }
        .output-text {
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.6;
            color: #d1d5db;
        }
        .loading {
            color: var(--accent-pink);
            animation: blink 1s infinite;
            display: none;
            font-weight: bold;
            margin-top: 10px;
            text-align: center;
            font-size: 12px;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>CHRONOS ENGINE // MODULE-03 // V3.6</h1>
        <div style="font-size: 12px; color: var(--accent-green);">● PRODUCTION READY CONTROL ACTIVE</div>
    </div>

    <div class="container">
        <div class="panel">
            <div class="form-group">
                <label>1. Industry / 業界</label>
                <select id="industry-select">
                    <option value="アパレル">アパレル（衣料・ファッション）</option>
                    <option value="コスメ・美容">コスメ・美容（化粧品・スキンケア）</option>
                </select>
                <input type="text" id="industry-custom" placeholder="✍ 別の業界を自由入力する場合はここに入力">
            </div>

            <div class="form-group">
                <label>2. Target Brand・Store / ブランド名・店舗名</label>
                <select id="brand-select">
                    <option value="AOKI">AOKI</option>
                    <option value="SHEIN">SHEIN</option>
                    <option value="ZARA">ZARA</option>
                    <option value="UNIQLO">UNIQLO</option>
                    <option value="資生堂">資生堂 (SHISEIDO)</option>
                    <option value="KATE">KATE</option>
                </select>
                <input type="text" id="brand-custom" placeholder="✍ 別のブランド・競合店舗を自由入力">
            </div>
            
            <div class="form-group">
                <label>3. Product Category / 品種</label>
                <select id="category-select">
                    <option value="全品種累計">★全品種累計</option>
                    <option value="Tシャツ/カットソー">Tシャツ/カットソー</option>
                    <option value="シャツ/ブラウス">シャツ/ブラウス</option>
                    <option value="ニット/セーター">ニット/セーター</option>
                    <option value="ワンピース">ワンピース</option>
                    <option value="アウター/ジャケット">アウター/ジャケット</option>
                    <option value="パンツ/ボトムス">パンツ/ボトムス</option>
                    <option value="スキンケア/化粧水">スキンケア/化粧水</option>
                    <option value="美容液/セラム">美容液/セラム</option>
                    <option value="ファンデーション">ファンデーション</option>
                    <option value="リップ/口紅">リップ/口紅</option>
                </select>
                <input type="text" id="category-custom" placeholder="✍ 別の具体的な品種を自由入力">
            </div>

            <div class="form-group">
                <label>4. Sales Channel / 販売チャネル</label>
                <select id="channel-select">
                    <option value="全体（マルチチャネル）">全体（マルチチャネル集計）</option>
                    <option value="Amazon">Amazon</option>
                    <option value="楽天市場">楽天市場</option>
                    <option value="Shopee">Shopee</option>
                    <option value="eBay">eBay</option>
                    <option value="Qoo10">Qoo10</option>
                    <option value="自社ECサイト">自社ECサイト</option>
                </select>
                <input type="text" id="channel-custom" placeholder="✍ 別のチャネル（例: TikTok Shop等）を自由入力">
            </div>

            <div class="form-group">
                <label>5. Target Region / 対象国・地域</label>
                <select id="region-select">
                    <option value="全世界（累計）">全世界（累計）</option>
                    <option value="日本">日本</option>
                    <option value="アメリカ">アメリカ</option>
                    <option value="東南アジア">東南アジア</option>
                    <option value="ヨーロッパ">ヨーロッパ</option>
                </select>
                <input type="text" id="region-custom" placeholder="✍ 別の特定の国名（例: 台湾、英国）を自由入力">
            </div>

            <div class="form-group">
                <label>6. Attributes / 色柄・素材・デザイン傾向</label>
                <select id="attributes-select">
                    <option value="モノトーン, コットン, オーバーサイズ">モノトーン, コットン, オーバーサイズ</option>
                    <option value="パステルカラー, シルク, フェミニン">パステルカラー, シルク, フェミニン</option>
                    <option value="オーガニック, 無添加, 低刺激（コスメ用）">オーガニック, 無添加, 低刺激（コスメ用）</option>
                    <option value="高保湿, ヒアルロン酸, アンチエイジング（コスメ用）">高保湿, ヒアルロン酸, アンチエイジング</option>
                </select>
                <input type="text" id="attributes-custom" placeholder="✍ 自由な属性キーワード（コンマ区切り）">
            </div>

            <button class="btn" onclick="runAnalysis()">AI多角分析・グラフ生成</button>
            <div class="loading" id="loadingText">▶ ENGINE RUNNING CRITICAL DATA...</div>
        </div>

        <div class="dashboard">
            <div class="chart-container">
                <div class="chart-title" id="titleProducts">製品売上ランキング（推定数量）</div>
                <canvas id="chartProducts"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">店舗・ブランド チャネル別シェア比率 (%)</div>
                <canvas id="chartChannels"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">色柄・素材・デザイン別 売上構成比</div>
                <canvas id="chartDesigns"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">レビュー感情不満分析（件数順）</div>
                <canvas id="chartSentiments"></canvas>
            </div>

            <div class="output-panel">
                <div class="chart-title">CHRONOS 商品開発戦略指示書 OUTPUT</div>
                <div class="output-text" id="outputText">ここにAIの緻密な分析指示書が出力されます。左のパラメータを調整して実行してください。</div>
            </div>
        </div>
    </div>

    <script>
        let charts = {};

        function initChart(id, type, labels, data, label, color) {
            if (charts[id]) charts[id].destroy();
            const ctx = document.getElementById(id).getContext('2d');
            charts[id] = new Chart(ctx, {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{
                        label: label,
                        data: data,
                        backgroundColor: color,
                        borderColor: color,
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#9ca3af', font: { size: 10 } } } },
                    scales: type === 'bar' ? {
                        x: { grid: { color: '#1f2937' }, ticks: { color: '#9ca3af', font: { size: 9 } } },
                        y: { grid: { color: '#1f2937' }, ticks: { color: '#9ca3af', font: { size: 9 } } }
                    } : {}
                }
            });
        }

        function getHybridValue(selectId, customId) {
            const customVal = document.getElementById(customId).value.trim();
            if (customVal !== "") return customVal;
            return document.getElementById(selectId).value;
        }

        async function runAnalysis() {
            const btn = document.querySelector('.btn');
            const loading = document.getElementById('loadingText');
            btn.disabled = true;
            loading.style.display = 'block';

            const payload = {
                industry: getHybridValue('industry-select', 'industry-custom'),
                brand: getHybridValue('brand-select', 'brand-custom'),
                category: getHybridValue('category-select', 'category-custom'),
                channel: getHybridValue('channel-select', 'channel-custom'),
                region: getHybridValue('region-select', 'region-custom'),
                attributes: getHybridValue('attributes-select', 'attributes-custom')
            };

            document.getElementById('titleProducts').innerText = `${payload.category} 売上ランキング（推定数量）`;

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();

                if (result.error) {
                    document.getElementById('outputText').innerText = `【システムエラー】\n${result.error}`;
                    return;
                }

                initChart('chartProducts', 'bar', result.chartProducts.labels, result.chartProducts.data, '推定売上数', '#38bdf8');
                initChart('chartChannels', 'pie', result.chartChannels.labels, result.chartChannels.data, 'シェア', ['#38bdf8', '#34d399', '#a78bfa', '#f472b6', '#fbbf24', '#e5e7eb']);
                initChart('chartDesigns', 'doughnut', result.chartDesigns.labels, result.chartDesigns.data, '構成比', ['#a78bfa', '#f472b6', '#34d399', '#fbbf24']);
                initChart('chartSentiments', 'bar', result.chartSentiments.labels, result.chartSentiments.data, '不満・評価件数', '#f472b6');

                document.getElementById('outputText').innerText = result.commentary;

            } catch (error) {
                document.getElementById('outputText').innerText = `【通信エラー発生】\nサーバーとの通信に失敗しました。\n詳細: ${error.message}`;
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
